<style>
  /* 系统中文字体栈 - 无需加载外部字体，国内秒开 */
  @font-face {

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1207;
    background-image:
      radial-gradient(ellipse at 50% 0%, rgba(180,140,60,0.12) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(200,160,80,0.06) 0%, transparent 50%),

    align-items: flex-start;

    padding: 20px;
  }

  .container {
    background:
      linear-gradient(135deg, rgba(40,25,10,0.95) 0%, rgba(35,22,8,0.97) 50%, rgba(42,28,12,0.95) 100%);

    border-image: linear-gradient(135deg, #6b4f12, #c4a44a, #6b4f12) 1;
    box-shadow:

      0 0 120px rgba(150,100,20,0.12),

    width: 100%;

    position: relative;
    overflow: hidden;

  }

  .container::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='6' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    opacity: 0.5; pointer-events: none; border-radius: 8px;
  }

  .title-area { text-align: center; margin-bottom: 28px; position: relative; z-index: 1; }
  .title {
    font-family: 'STKaiti', 'KaiTi', '楷体', 'Ma Shan Zheng', cursive;
    font-size: 2.8em; font-weight: 900; color: #d4a843;
    text-shadow: 0 0 30px rgba(200,150,40,0.5), 0 2px 4px rgba(0,0,0,0.6);

  }
  .subtitle { font-size: 0.95em; color: #a0895e; letter-spacing: 0.2em; }
  .subtitle span { color: #c4a44a; }

  /* 九宫格 */
  .luoshu-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr);
    gap: 4px; max-width: 420px; margin: 0 auto 28px; aspect-ratio: 1;
    position: relative; z-index: 1;
  }
  .palace {
    background: linear-gradient(145deg, rgba(50,32,14,0.9), rgba(35,20,8,0.95));
    border: 1.5px solid #5a4218; border-radius: 3px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.3s ease; position: relative; padding: 6px; min-height: 110px;
  }
  .palace:hover {
    border-color: #c4a44a;
    box-shadow: 0 0 20px rgba(200,160,40,0.3), inset 0 0 20px rgba(200,160,40,0.05);
    transform: scale(1.03); z-index: 2;
  }
  .palace.selected {
    border-color: #d4a843 !important;
    box-shadow: 0 0 28px rgba(220,160,40,0.5), inset 0 0 24px rgba(220,160,40,0.1) !important;
    background: linear-gradient(145deg, rgba(60,38,14,0.9), rgba(50,30,10,0.95)) !important;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100%{box-shadow:0 0 28px rgba(220,160,40,0.5),inset 0 0 24px rgba(220,160,40,0.1);}

  .palace-num { font-size:1.6em; font-weight:900; color:#d4a843; line-height:1; text-shadow:0 0 10px rgba(200,150,40,0.4); }

  .input-area {

  .question-input:focus { border-color:#c4a44a; box-shadow:0 0 12px rgba(200,150,40,0.3); }
  .question-input::placeholder { color:#4a3818; }

  .btn-divine, .btn-poster, .btn-share, .btn-download {
    padding: 10px 24px; font-size: 0.95em;
    font-family: 'STKaiti', 'KaiTi', '楷体', 'Ma Shan Zheng', cursive;

  .btn-download:hover { box-shadow: 0 0 24px rgba(80,120,220,0.4); border-color: #6088e0; }
  .btn-divine:active, .btn-poster:active, .btn-share:active, .btn-download:active { transform: scale(0.97); }

  .btn-clear {
    padding: 10px 20px; font-size:0.9em; font-family:'PingFang SC','Microsoft YaHei','STSong','SimSun',serif;

  .result-area.show { display:block; }

  .trigram-card .t-name { font-size:0.82em; color:#c4a44a; letter-spacing:0.08em; margin-top:4px; }
  .trigram-card .t-info { font-size:0.68em; color:#8b7848; margin-top:2px; }

  .reading-box {
    background:rgba(25,15,6,0.8); border:1px solid #4a3010; border-radius:6px;
    padding:16px 18px; margin-bottom:12px;
  }
  .reading-box h4 { color:#c4a44a; font-size:0.95em; letter-spacing:0.1em; border-bottom:1px solid #3a2810; padding-bottom:7px; margin-bottom:9px; }
  .reading-box p { font-size:0.88em; line-height:1.7; color:#b0986a; text-align:justify; }

    font-size:1.05em; color:#d4a843; text-align:center; font-weight:700;

  .yao-tag { padding:4px 10px; border-radius:3px; font-size:0.72em; letter-spacing:0.06em; font-weight:600; }

  .yao-xiong { background:rgba(200,60,50,0.15); color:#c44; border:1px solid rgba(200,60,50,0.25); }
  .yao-ping { background:rgba(180,140,60,0.15); color:#c4a44a; border:1px solid rgba(180,140,60,0.25); }

  /* 按钮行 */
  .action-row { display:flex; justify-content:center; gap:10px; flex-wrap:wrap; margin-top:8px; }

  /* ====== 香火计数器 ====== */
  .incense-counter {
    position: relative; z-index: 1; text-align: center; margin: 20px auto 0;
    padding: 14px 18px; max-width: 340px;
    background: linear-gradient(180deg, rgba(40,22,8,0.7), rgba(20,10,4,0.8));
    border: 1px solid #4a3010; border-radius: 8px;
  }

  .incense-icon-row {
    display: flex; justify-content: center; gap: 3px; margin-bottom: 6px;
  }

  .incense-stick {
    width: 3px; height: 24px;
    background: linear-gradient(180deg, #d4a843, #8b6914, #3a1808);
    border-radius: 1px 1px 0 0; position: relative;
    animation: incense-burn 3s ease-in-out infinite;
  }

  .incense-stick:nth-child(2) { animation-delay: 0.3s; height: 20px; }
  .incense-stick:nth-child(3) { animation-delay: 0.6s; height: 26px; }
  .incense-stick:nth-child(4) { animation-delay: 0.9s; height: 18px; }
  .incense-stick:nth-child(5) { animation-delay: 1.2s; height: 22px; }

  .incense-stick::after {
    content: ''; position: absolute; top: -6px; left: -2px;
    width: 7px; height: 8px; border-radius: 50%;
    background: radial-gradient(circle, #f80, #d40);
    box-shadow: 0 0 8px rgba(255,140,0,0.6), 0 0 16px rgba(255,100,0,0.3);
    animation: ember-glow 2s ease-in-out infinite;
  }

  @keyframes incense-burn {
    0%, 100% { opacity: 0.9; }
    50% { opacity: 0.5; }
  }

  @keyframes ember-glow {
    0%, 100% { box-shadow: 0 0 6px rgba(255,140,0,0.5), 0 0 12px rgba(255,100,0,0.2); }
    50% { box-shadow: 0 0 12px rgba(255,160,0,0.8), 0 0 24px rgba(255,120,0,0.4); }
  }

  .incense-count {
    font-family: 'STKaiti', 'KaiTi', '楷体', 'Ma Shan Zheng', cursive;
    font-size: 1.6em; color: #d4a843;
    text-shadow: 0 0 16px rgba(200,150,40,0.4);
    letter-spacing: 0.12em; margin: 4px 0;
  }

  .incense-label {
    font-size: 0.7em; color: #8b7848; letter-spacing: 0.12em;
  }

  .incense-smoke {
    position: absolute; top: -8px; left: 50%; transform: translateX(-50%);
    font-size: 1.4em; opacity: 0.4; animation: smoke-rise 4s ease-in-out infinite;
    pointer-events: none;
  }

  @keyframes smoke-rise {
    0% { opacity: 0.15; transform: translateX(-50%) translateY(0); }
    50% { opacity: 0.4; transform: translateX(calc(-50% + 6px)) translateY(-8px); }
    100% { opacity: 0.1; transform: translateX(calc(-50% - 4px)) translateY(-16px); }
  }

  /* 海报中的计数器 */
  .poster-counter {
    text-align: center; margin: 8px 0;
    padding: 8px 14px; background: rgba(25,14,5,0.6);
    border: 1px solid #3a2810; border-radius: 4px;
  }

  .poster-counter .pc-num {
    font-family: 'STKaiti', 'KaiTi', '楷体', 'Ma Shan Zheng', cursive;
    font-size: 1.3em; color: #d4a843;
    text-shadow: 0 0 10px rgba(200,150,40,0.3);
  }

  .poster-counter .pc-label { font-size: 0.6em; color: #8b7848; letter-spacing: 0.1em; }

  /* ====== 海报模态 ====== */
  .modal-overlay {
    display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85);
    z-index:1000; justify-content:center; align-items:center; padding:20px;
  }
  .modal-overlay.show { display:flex; }

  .modal-close {
    position:absolute; top:16px; right:24px; font-size:2em; color:#a0895e;
    cursor:pointer; z-index:1010; transition:color 0.3s;
  }
  .modal-close:hover { color:#d4a843; }

  .poster-wrapper {
    background:#1a1005; border:3px solid #6b4f12; border-radius:6px;
    box-shadow:0 0 60px rgba(180,130,40,0.4);
    max-width:500px; width:100%; position:relative;
  }

  .poster-inner {
    padding:30px 24px 20px; position:relative;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(180,140,60,0.1) 0%, transparent 60%),
      linear-gradient(180deg, rgba(35,20,6,0.98), rgba(25,14,5,0.99));
  }

  .poster-inner::before {
    content:''; position:absolute; inset:12px; border:1px solid rgba(180,140,60,0.2);
    pointer-events:none;
  }

  .poster-title {
    text-align:center; font-family:'STKaiti','KaiTi','楷体',cursive;
    font-size:2em; color:#d4a843; letter-spacing:0.2em; margin-bottom:2px;
    text-shadow:0 0 20px rgba(200,150,40,0.4);
  }

  .poster-sub { text-align:center; font-size:0.75em; color:#8b7848; letter-spacing:0.2em; margin-bottom:18px; }

  .poster-q { text-align:center; font-size:0.85em; color:#a0895e; margin-bottom:14px; }
  .poster-q span { color:#c4a44a; font-weight:600; }

  .poster-trigrams { display:flex; justify-content:center; gap:16px; margin-bottom:16px; }
  .poster-tri {
    text-align:center; background:rgba(20,10,5,0.6); border:1px solid #4a3010;
    border-radius:4px; padding:10px 12px; min-width:80px;
  }
  .poster-tri .pt-sym { font-size:1.8em; color:#d4a843; }
  .poster-tri .pt-name { font-size:0.7em; color:#a0895e; margin-top:2px; }

  .poster-verdict {
    text-align:center; font-size:1em; color:#d4a843; font-weight:700;
    padding:10px 16px; margin-bottom:12px; background:rgba(25,15,6,0.6);
    border:1px solid #4a3010; border-radius:4px; letter-spacing:0.08em;
  }

  .poster-qr-row {
    display:flex; justify-content:center; align-items:center; gap:20px;
    margin:16px 0; flex-wrap:wrap;
  }

  .poster-qr-box { text-align:center; }
  .poster-qr-box .qr-label { font-size:0.65em; color:#8b7848; margin-top:6px; letter-spacing:0.08em; }
  #posterQrCode canvas, #posterQrCode img { border:2px solid #5a4218; border-radius:4px; }

  .poster-signature {

  }
  .poster-signature .sig-name {

  .poster-actions {

  /* 分享面板 */
  .share-panel {

  .copy-toast {

  @media (max-width:600px) {

<body>

<div class="container">
  <div class="title-area">
    <div class="title">河圖洛書</div>
    <div class="subtitle">— <span>九宮</span>占測 · 伏羲八卦 —</div>
  </div>

  <div class="luoshu-grid" id="luoshuGrid"></div>

  <p class="hint">✦ 点击宫位择数，或直接输入1-9三个数字 ✦</p>

  <div class="input-area">
    <div class="input-group"><label>上卦·数</label><input type="number" class="num-input" id="num1" min="1" max="9" placeholder="1-9"></div>
    <div class="input-group"><label>中卦·数</label><input type="number" class="num-input" id="num2" min="1" max="9" placeholder="1-9"></div>
    <div class="input-group"><label>下卦·数</label><input type="number" class="num-input" id="num3" min="1" max="9" placeholder="1-9"></div>
    <input type="text" class="question-input" id="question" placeholder="写下你想问的事…">
    <button class="btn-divine" onclick="castDivination()">起 局</button>
    <button class="btn-clear" onclick="clearAll()">清空</button>
  </div>

  <div class="result-area" id="resultArea">
    <div class="result-header" id="resultTitle"></div>

<script>
// ========== 九宫数据（洛书数序） ==========
const palaces = {
  1: { num:1, name:'坎', trigram:'☵', element:'水', direction:'北',
       color:'#1a1a2e', season:'冬', body:'耳', virtue:'智', emblem:'玄武',
       desc:'坎者，陷也。水润万物而不争，处下而利众生。象征艰险中藏转机，以柔克刚，以智取胜。' },
  2: { num:2, name:'坤', trigram:'☷', element:'土', direction:'西南',
       color:'#3a2a0a', season:'长夏', body:'腹', virtue:'信', emblem:'黄龙',
       desc:'坤者，顺也。厚德载物，柔顺利贞。象征包容万物，以静制动，顺势而成。' },
  3: { num:3, name:'震', trigram:'☳', element:'木', direction:'东',
       color:'#1a3a1a', season:'春', body:'足', virtue:'仁', emblem:'青龙',
       desc:'震者，动也。雷行天下，万物始生。象征变动中孕育新机，敢作敢为，一鸣惊人。' },
  4: { num:4, name:'巽', trigram:'☴', element:'木', direction:'东南',
       color:'#1a3a2a', season:'春夏', body:'股', virtue:'礼', emblem:'凤凰',
       desc:'巽者，入也。风行草偃，无孔不入。象征以柔渗透，顺势而行，借力使力。' },
  5: { num:5, name:'中宫', trigram:'○', element:'土', direction:'中央',
       color:'#3a2a0a', season:'四时', body:'肉', virtue:'信', emblem:'麒麟',
       desc:'中宫者，太极也。统御八方，调和阴阳。象征居中守正，不变应万变，厚德载福。' },
  6: { num:6, name:'乾', trigram:'☰', element:'金', direction:'西北',
       color:'#2a2a1a', season:'秋冬', body:'首', virtue:'义', emblem:'白虎',
       desc:'乾者，健也。天行健，君子以自强不息。象征刚健有力，积极进取，大吉大利。' },
  7: { num:7, name:'兑', trigram:'☱', element:'金', direction:'西',
       color:'#2a2a1a', season:'秋', body:'口', virtue:'义', emblem:'白虎',
       desc:'兑者，悦也。泽润万物，悦而相契。象征口舌言说、喜悦交流，利合作、利婚恋。' },
  8: { num:8, name:'艮', trigram:'☶', element:'土', direction:'东北',
       color:'#3a2a0a', season:'冬春', body:'手', virtue:'仁', emblem:'麒麟',
       desc:'艮者，止也。山岳巍然，知止不殆。象征适可而止，审时度势，守成待时。' },
  9: { num:9, name:'离', trigram:'☲', element:'火', direction:'南',
       color:'#3a1a1a', season:'夏', body:'目', virtue:'礼', emblem:'朱雀',
       desc:'离者，丽也。日月在天，光明普照。象征文明昌盛、附丽光明，利文教、利名声。' }
};

const luoshuOrder = [4, 9, 2, 3, 5, 7, 8, 1, 6];
let currentResult = null;

// ========== 建立九宫格 ==========
function buildGrid() {
  const grid = document.getElementById('luoshuGrid');
  luoshuOrder.forEach(num => {
    const p = palaces[num];
    const div = document.createElement('div');
    div.className = 'palace' + (num === 5 ? ' center-palace' : '');
    div.id = 'palace-' + num;
    div.innerHTML = `
      <span class="palace-num">${p.num}</span>
      <span class="palace-trigram">${p.trigram}</span>
      <span class="palace-name">${p.name}</span>
      <span class="palace-element">${p.element} · ${p.emblem}</span>
      <span class="palace-dir">${p.direction}</span>
    `;
    div.onclick = () => selectPalace(num);
    grid.appendChild(div);
  });
}

let selectedNums = [];
function countSelected() { return selectedNums.filter(n => n != null).length; }
function selectPalace(num) {
  if (selectedNums.includes(num)) {
    selectedNums = selectedNums.filter(n => n !== num);
    document.getElementById('palace-' + num).classList.remove('selected');
  } else if (countSelected() < 3) {
    const emptyIdx = selectedNums.findIndex(n => n == null);
    if (emptyIdx >= 0) selectedNums[emptyIdx] = num;
    else selectedNums.push(num);
    document.getElementById('palace-' + num).classList.add('selected');
  }
  syncInputs();
}
function syncInputs() {
  document.getElementById('num1').value = selectedNums[0] || '';
  document.getElementById('num2').value = selectedNums[1] || '';
  document.getElementById('num3').value = selectedNums[2] || '';
}
['num1','num2','num3'].forEach((id, i) => {
  document.getElementById(id).addEventListener('input', function() {
    let v = parseInt(this.value);
    if (isNaN(v) || v < 1 || v > 9) {
      this.value = '';
      if (selectedNums[i]) { document.getElementById('palace-' + selectedNums[i]).classList.remove('selected'); selectedNums[i] = null; }
      return;
    }
    if (selectedNums[i]) document.getElementById('palace-' + selectedNums[i]).classList.remove('selected');
    selectedNums[i] = v;
    document.getElementById('palace-' + v).classList.add('selected');
  });
});

function clearAll() {
  selectedNums = [];
  document.querySelectorAll('.palace').forEach(el => el.classList.remove('selected'));
  document.getElementById('num1').value = '';
  document.getElementById('num2').value = '';
  document.getElementById('num3').value = '';
  document.getElementById('question').value = '';
  document.getElementById('resultArea').classList.remove('show');
  document.getElementById('sharePanel').classList.remove('show');
  currentResult = null;
  closePoster();
}

// ========== 起局 ==========
function castDivination() {
  const n1 = parseInt(document.getElementById('num1').value);
  const n2 = parseInt(document.getElementById('num2').value);
  const n3 = parseInt(document.getElementById('num3').value);
  const question = document.getElementById('question').value.trim();

  if (isNaN(n1) || isNaN(n2) || isNaN(n3) || n1<1||n1>9 || n2<1||n2>9 || n3<1||n3>9) {
    alert('请输入三个1-9之间的数字，或点击九宫格选择三个宫位。');
    return;
  }
  if (!question) { alert('请写下你想问的事情。'); return; }

  // 实际占测 → 香火计数 +1
  hitCounter();

  document.querySelectorAll('.palace').forEach(el => el.classList.remove('selected'));
  [n1, n2, n3].forEach(n => document.getElementById('palace-' + n).classList.add('selected'));
  selectedNums = [n1, n2, n3];
  syncInputs();

  const p1 = palaces[n1], p2 = palaces[n2], p3 = palaces[n3];
  currentResult = generateReading(p1, p2, p3, question);
  currentResult.p1 = p1; currentResult.p2 = p2; currentResult.p3 = p3;
  currentResult.question = question;
  currentResult.n1 = n1; currentResult.n2 = n2; currentResult.n3 = n3;

  const area = document.getElementById('resultArea');
  area.classList.add('show');

  document.getElementById('resultTitle').textContent =
    `「${p1.name}${p1.trigram} → ${p2.name}${p2.trigram} → ${p3.name}${p3.trigram}」三才局`;

  document.getElementById('trigramRow').innerHTML = [p1, p2, p3].map(p => `
    <div class="trigram-card">
      <div class="t-symbol">${p.trigram}</div>
      <div class="t-name">${p.name}卦 · ${p.element}</div>
      <div class="t-info">${p.emblem} · ${p.direction}方</div>
    </div>
  `).join('');

  document.getElementById('readingText').textContent = currentResult.reading;
  document.getElementById('verdict').textContent = '【断曰】' + currentResult.verdict;
  document.getElementById('detailText').textContent = currentResult.detail;

  document.getElementById('yaoRow').innerHTML = currentResult.tags.map(t => {
    let cls = t.type === '吉' ? 'yao-ji' : t.type === '凶' ? 'yao-xiong' : 'yao-ping';
    return `<span class="yao-tag ${cls}">${t.label}</span>`;
  }).join('');

  document.getElementById('sharePanel').classList.remove('show');
  area.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

// ========== 解读引擎 ==========
function generateReading(p1, p2, p3, question) {
  const wuxingOrder = ['木','火','土','金','水'];
  const shengCheck = (a, b) => (wuxingOrder.indexOf(a) + 1) % 5 === wuxingOrder.indexOf(b);
  const keCheck = (a, b) => (wuxingOrder.indexOf(a) + 2) % 5 === wuxingOrder.indexOf(b);

  const flows = [];
  if (shengCheck(p1.element, p2.element)) flows.push({ type:'生', from:p1, to:p2, good:true });
  else if (keCheck(p1.element, p2.element)) flows.push({ type:'克', from:p1, to:p2, good:false });
  else if (p1.element === p2.element) flows.push({ type:'比和', from:p1, to:p2, good:true });
  else flows.push({ type:'耗', from:p1, to:p2, good:false });

  if (shengCheck(p2.element, p3.element)) flows.push({ type:'生', from:p2, to:p3, good:true });
  else if (keCheck(p2.element, p3.element)) flows.push({ type:'克', from:p2, to:p3, good:false });
  else if (p2.element === p3.element) flows.push({ type:'比和', from:p2, to:p3, good:true });
  else flows.push({ type:'耗', from:p2, to:p3, good:false });

  const goodFlows = flows.filter(f => f.good).length;
  let overall = goodFlows === 2 ? '大吉' : goodFlows === 1 ? '中平' : '凶险';

  const allSame = p1.element === p2.element && p2.element === p3.element;
  const zhongGong = (p1.num === 5 || p2.num === 5 || p3.num === 5);
  if (allSame) overall = '三才一气，大吉之兆';
  if (zhongGong && !overall.includes('大吉')) overall = '中宫坐镇，转危为安';

  const tianDiEffect = (p1.num === 6 && p3.num === 2) ? '天地否塞，事有不顺。' :
                        (p1.num === 2 && p3.num === 6) ? '地天泰交，万事亨通。' : '';

  let zhongEffect = zhongGong ? '中宫入局，太极转动，虽有波折终归和顺。五黄入中，调和四象，凡事以稳为主。' : '';

  const keywords = extractKeywords(question);
  const reading = buildContextReading(p1, p2, p3, flows, keywords, question, tianDiEffect, zhongEffect);
  const detail = buildDetailAnalysis(p1, p2, p3, flows);
  const verdict = buildVerdict(overall, p1, p2, p3, flows);
  const tags = buildTags(overall, p1, p2, p3, flows);

  return { reading, detail, verdict, tags, overall };
}

function extractKeywords(q) {
  const map = { '财':'财运','钱':'财运','赚':'财运','富':'财运','金':'财运','爱':'感情','情':'感情','婚':'姻缘','恋':'感情','缘':'姻缘','业':'事业','工作':'事业','职':'事业','事':'事业','仕':'事业','健康':'健康','病':'健康','体':'健康','身':'健康','疾':'健康','学':'学业','考':'学业','试':'学业','读':'学业','文':'学业','家':'家宅','宅':'家宅','居':'家宅','房':'家宅','行':'出行','旅':'出行','迁':'出行','移':'出行','讼':'官非','官':'官非','法':'官非','诉':'官非' };
  for (const [k, v] of Object.entries(map)) { if (q.includes(k)) return v; }
  return '运势';
}

function buildContextReading(p1, p2, p3, flows, keyword, question, tianDiEffect, zhongEffect) {
  let text = `问「${question}」，占得三数：${p1.num}（${p1.name}${p1.trigram}${p1.element}）、${p2.num}（${p2.name}${p2.trigram}${p2.element}）、${p3.num}（${p3.name}${p3.trigram}${p3.element}）。`;
  if (tianDiEffect) text += tianDiEffect + ' ';
  if (zhongEffect) text += zhongEffect + ' ';
  text += `\n\n五行流布：${p1.element}→${p2.element}→${p3.element}。`;
  flows.forEach(f => {
    if (f.type === '生') text += `${f.from.name}宫生${f.to.name}宫，其气顺通，吉。`;
    else if (f.type === '克') text += `${f.from.name}宫克${f.to.name}宫，其势有阻，慎之。`;
    else if (f.type === '比和') text += `${f.from.name}与${f.to.name}比和相助，其力倍增。`;
    else text += `${f.from.name}宫反耗于${f.to.name}宫，力有不逮。`;
  });
  text += '\n\n';
  switch (keyword) {
    case '财运':
      text += p1.num===6||p2.num===6||p3.num===6 ? '乾金入局，财星高照，宜积极进取。正财偏财皆有利，然需防秋后金气过旺伤木。'
        : p1.num===8||p2.num===8||p3.num===8 ? '艮山稳重，财运守成为上。不宜投机冒险，稳扎稳打可积少成多。'
        : '财运需看来路，五行流通则财源不断。切忌贪心冒进，守正得吉。'; break;
    case '感情': case '姻缘':
      text += p1.num===7||p2.num===7||p3.num===7 ? '兑泽悦泽，感情之事顺遂。利表白、利婚嫁，口舌之利可化干戈为玉帛。'
        : p1.num===9||p2.num===9||p3.num===9 ? '离火光明，感情热烈。然火性炎上，须防激情过后冷却，宜以柔济刚。'
        : '感情之事，贵在真诚。卦象所示，宜静待时机，强求反失。'; break;
    case '事业':
      text += p1.num===3||p2.num===3||p3.num===3 ? '震雷动而万物生，事业有变动机遇。当机立断，敢为人先，可成大事。'
        : p1.num===4||p2.num===4||p3.num===4 ? '巽风入微，事业宜走柔和路线。以智取胜，借势而行，不可硬碰。'
        : '事业之路，刚柔并济。卦象指示当审时度势，择机而动。'; break;
    case '健康':
      text += `天卦应${p1.body}，人卦应${p2.body}，地卦应${p3.body}。此三处需多加留意。${p1.element==='火'||p2.element==='火'||p3.element==='火'?'火旺伤阴，注意心脑血管。 ':''}${p1.element==='水'||p2.element==='水'||p3.element==='水'?'水盛伤阳，注意肾与泌尿系统。 ':''}调养之道，贵在平衡。`; break;
    default:
      text += `综观全局，${p1.name}${p1.trigram}为天时，${p2.name}${p2.trigram}为人和，${p3.name}${p3.trigram}为地利。${[p1,p2,p3].map(p=>p.desc).join('')}`;
  }
  return text;
}

function buildDetailAnalysis(p1, p2, p3, flows) {
  const sum = p1.num + p2.num + p3.num;
  let d = `三数和为${sum}，`;
  if (sum === 15) d += '合洛书纵横十五之数，大吉。';
  else if (sum % 3 === 0) d += '合三才之数，天地人贯通，吉。';
  else if (sum > 20) d += '气数偏旺，宜以静制动。';
  else if (sum < 10) d += '气数偏弱，宜养精蓄锐。';
  else d += '气数中和，进退有度。';
  d += '\n\n';
  d += `天盘${p1.name}宫主事之始，居${p1.direction}方，${p1.season}当令最旺。`;
  d += `人盘${p2.name}宫主事之中，${p2.num===5?'中宫调和四方，当守正不移。':`居${p2.direction}方，得${p2.emblem}庇佑。`}`;
  d += `地盘${p3.name}宫主事之果，${p3.num===5?'五黄归中，结局平稳。':`居${p3.direction}方，${p3.virtue}德为用。`}`;
  d += '\n\n五行建议：';
  const elements = [p1.element, p2.element, p3.element];
  const uniqueElements = [...new Set(elements)];
  if (uniqueElements.length === 1) {
    d += `三宫皆属${uniqueElements[0]}，气纯而专。${uniqueElements[0]==='土'?'土厚宜以木疏之，多行东方、着青色。':uniqueElements[0]==='火'?'火旺宜以水济之，多居北方、着黑色。':uniqueElements[0]==='水'?'水盛宜以土制之，多居中土、着黄色。':uniqueElements[0]==='金'?'金重宜以火炼之，多近光热、着红色。':'木盛宜以金裁之，多向西方、着白色。'}`;
  } else {
    d += `三宫五行${uniqueElements.join('、')}，${uniqueElements.length===2?'二气交争，宜调和折中。':'三气驳杂，宜专一不二。'}`;
  }
  return d;
}

function buildVerdict(overall, p1, p2, p3, flows) {
  if (overall.includes('三才一气')) return `三才同气，${p1.element}德纯粹。天时地利人和皆备，此局大吉，所问之事必有善果，速行勿疑。`;
  if (overall.includes('转危为安')) return `虽有波折，然中宫坐镇，终可转危为安。${p2.name}居中调和，静待时机，不可冒进。`;
  if (overall.includes('大吉')) return `${p1.name}天时已至，${p3.name}地利可依，人事在${p2.name}。顺天应人，所谋必成。`;
  if (overall.includes('中平')) return `吉凶参半，事在人为。${p1.name}${p1.trigram}启其端，${p3.name}${p3.trigram}定其果。守正则吉，妄动则咎。`;
  return `天时不利，地利未备，人事多阻。${p1.name}与${p3.name}相违，宜暂停进取，退守待时。`;
}

function buildTags(overall, p1, p2, p3, flows) {
  const tags = [];
  const goodCount = flows.filter(f => f.good).length;
  tags.push({ type: goodCount===2?'吉':goodCount===1?'平':'凶', label:`五行流通: ${goodCount}/2` });
  const auspicious = [1,6,8,4];
  const allAuspicious = [p1.num,p2.num,p3.num].every(n => auspicious.includes(n));
  tags.push({ type: allAuspicious?'吉':'平', label:'宫位吉凶' });
  const now = new Date();
  const month = now.getMonth() + 1;
  const inSeason = [p1,p2,p3].some(p => {
    if (p.season === '四时') return true;
    const months = [];
    if (p.season.includes('春')) months.push(2,3,4);
    if (p.season.includes('夏') && !p.season.includes('长')) months.push(5,6,7);
    if (p.season.includes('长夏')) months.push(6,7);
    if (p.season.includes('秋')) months.push(8,9,10);
    if (p.season.includes('冬')) months.push(11,12,1);
    return months.includes(month);
  });
  tags.push({ type: inSeason?'吉':'平', label: inSeason?'当令得时':'非当令' });
  const sum = p1.num + p2.num + p3.num;
  tags.push({ type: sum===15?'吉':'平', label: sum===15?'合洛书15数':`三数和${sum}` });
  return tags;
}

// ========== 海报 ==========
function openPoster() {
  if (!currentResult) { alert('请先起局占测后再生成海报。'); return; }
  if (typeof QRCode === 'undefined') { showToast('二维码组件加载失败，请刷新后重试'); return; }

  const { p1, p2, p3, question, verdict } = currentResult;

  const pqEl = document.getElementById('posterQuestion');
  pqEl.textContent = '';
  const pqSpan = document.createElement('span');
  pqSpan.textContent = `「${question}」`;
  pqEl.appendChild(document.createTextNode('所问：'));
  pqEl.appendChild(pqSpan);
  document.getElementById('posterTrigrams').innerHTML = [p1, p2, p3].map(p => `
    <div class="poster-tri">
      <div class="pt-sym">${p.trigram}</div>
      <div class="pt-name">${p.name} · ${p.element}</div>
    </div>
  `).join('');
  document.getElementById('posterVerdict').textContent = '【断曰】' + verdict;

  // 日期 + 计数
  const now = new Date();
  const dateStr = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  document.getElementById('posterDate').textContent = dateStr + ' · 河洛九宫起局';
  // 更新海报计数
  const posterCnt = document.getElementById('posterCountNum');
  if (posterCnt && window._visitorCount) {
    posterCnt.textContent = formatCount(window._visitorCount);
  }

  // 生成二维码（指向当前页面URL）
  const qrContainer = document.getElementById('posterQrCode');
  qrContainer.innerHTML = '';
  const pageUrl = window.location.href.split('?')[0];
  new QRCode(qrContainer, {
    text: pageUrl,
    width: 110,
    height: 110,
    colorDark: '#c4a44a',
    colorLight: '#1a1005',
    correctLevel: QRCode.CorrectLevel.M
  });

  document.getElementById('posterModal').classList.add('show');
}

function closePoster() {
  document.getElementById('posterModal').classList.remove('show');
}

// 点击模态背景关闭
document.getElementById('posterModal').addEventListener('click', function(e) {
  if (e.target === this) closePoster();
});

async function downloadPoster() {
  if (typeof html2canvas === 'undefined') { showToast('海报组件加载失败，请刷新后重试'); return; }
  const posterEl = document.getElementById('posterContent');
  try {
    showToast('正在生成海报…');
    const canvas = await html2canvas(posterEl, {
      backgroundColor: '#1a1005',
      scale: 2,
      useCORS: true,
      allowTaint: true
    });
    const link = document.createElement('a');

    showToast('海报已保存！');
  } catch (e) {
    console.error(e);
    showToast('生成失败，请刷新后重试');

}

// ========== 分享海报图片 ==========
async function sharePosterImage() {
  if (typeof html2canvas === 'undefined') { showToast('海报组件加载失败，请刷新后重试'); return; }
  const posterEl = document.getElementById('posterContent');
  try {
    const canvas = await html2canvas(posterEl, {
      backgroundColor: '#1a1005',
      scale: 2,
      useCORS: true,
      allowTaint: true
    });
    const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
    if (!blob) { showToast('海报生成失败，请重试'); return; }
    const file = new File([blob], '河图洛书九宫占测.png', { type: 'image/png' });

    if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({
        title: '河图洛书 · 九宫占测',
        text: '伏羲八卦 · 河洛九宫 · 三数起局',
        files: [file]
      });
    } else if (navigator.share) {
      await navigator.share({
        title: '河图洛书 · 九宫占测',
        text: '伏羲八卦 · 河洛九宫 · 三数起局',
        url: window.location.href
      });
    } else {
      // fallback: download
      const link = document.createElement('a');
      link.download = '河图洛书九宫占测_海报.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
      showToast('已保存海报到本地，可手动分享');
    }
  } catch (e) {
    if (e.name !== 'AbortError') {
      console.error(e);
      try {
        const canvas = await html2canvas(posterEl, { backgroundColor: '#1a1005', scale: 2 });
        const link = document.createElement('a');
        link.download = '河图洛书九宫占测_海报.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
        showToast('已保存海报到本地，可手动分享');
      } catch (e2) {
        console.error(e2);
        showToast('海报生成失败，请刷新后重试');
      }
    }
  }
}

function copyToClipboard(text) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).catch(() => {});
  } else {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
  }
}

}

// ========== 香火统计计数器 ==========
// 计数策略：页面加载时用 get 展示当前总数，用户每次"起局"才 hit 递增
// 同一会话内多次起局只计数一次（sessionStorage 标记）
// 使用多个备用计数器 API，确保国内可用
const COUNTER_APIS = [
  { get: (ns,key) => `https://api.countapi.xyz/get/${ns}/${key}`, hit: (ns,key) => `https://api.countapi.xyz/hit/${ns}/${key}`, parse: r => r.value },
  { get: (ns,key) => `https://countapi.xyz/get/${ns}/${key}`, hit: (ns,key) => `https://countapi.xyz/hit/${ns}/${key}`, parse: r => r.value },
];
const COUNTER_NS = 'hetu-luoshu-9gong';
const COUNTER_KEY = 'visits';

async function tryFetch(url) {
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 5000);
  try {
    const resp = await fetch(url, { signal: controller.signal });
    clearTimeout(timeout);
    if (resp.ok) return resp;
  } catch(e) { /* try next */ }
  return null;
}

async function fetchCounterDisplay() {
  let found = false;
  for (const api of COUNTER_APIS) {
    const resp = await tryFetch(api.get(COUNTER_NS, COUNTER_KEY));
    if (resp) {
      try {
        const data = await resp.json();
        const val = api.parse(data);
        if (typeof val === 'number' && val > 0) {
          updateCounterDisplay(val);
          found = true;
          break;
        }
      } catch(e) {}
    }
  }
  if (!found) updateCounterDisplay(0);
}

async function hitCounter() {
  if (sessionStorage.getItem('luoshu_counted')) return;

  for (const api of COUNTER_APIS) {
    const resp = await tryFetch(api.hit(COUNTER_NS, COUNTER_KEY));
    if (resp) {
      try {
        const data = await resp.json();
        const val = api.parse(data);
        if (typeof val === 'number' && val > 0) {
          updateCounterDisplay(val);
          sessionStorage.setItem('luoshu_counted', '1');
        }
        return;
      } catch(e) {}
    }
  }
}

function updateCounterDisplay(count) {
  if (window._visitorCount != null && count <= window._visitorCount) return;
  window._visitorCount = count;
  const num = formatCount(count);
  const el = document.getElementById('incenseCount');
  const posterEl = document.getElementById('posterCountNum');
  if (el) el.textContent = num;
  if (posterEl) posterEl.textContent = num;
}

function formatCount(n) {
  if (!n || n < 1) return '—';
  if (n < 1000) return n.toString();
  if (n < 10000) return (n / 1000).toFixed(1) + 'k';
  if (n < 1000000) return Math.floor(n / 1000) + 'k';
  return (n / 1000000).toFixed(1) + 'M';
}

buildGrid();
